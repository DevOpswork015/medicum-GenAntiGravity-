name: Publish to Medium
on:
  schedule:
    - cron: '0 7,8 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium
          
      - name: Setup auth state
        run: |
          mkdir -p auth
          echo '${{ secrets.MEDIUM_STATE }}' > auth/medium_state.json
          
      - name: Generate Post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_post.py
        
      - name: Generate Images
        run: python scripts/generate_images.py
        
      - name: Render HTML
        run: python scripts/render_html.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          git commit -m "chore: auto-generate new post" || echo "No changes to commit"
          git push
          
      - name: Wait for Pages deployment
        run: |
          echo "Waiting 3 minutes for GitHub Pages to build and deploy..."
          sleep 180
        
      - name: Publish to Medium
        env:
          PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          CI: "true"
        run: python scripts/publish_medium.py
